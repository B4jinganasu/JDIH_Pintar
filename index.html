<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Kamus Praturan Pintar - Pusat Data Hukum Cerdas By Abang AL. Cari peraturan daerah, undang-undang, dan dokumen hukum dengan teknologi AI.">
  <meta name="theme-color" content="#060b1d">
  <title>Kamus Praturan Pintar — Login</title>
  
  <!-- CSS -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/login.css">
  <link rel="stylesheet" href="css/responsive.css">
  
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚖️</text></svg>">
</head>
<body>
  <div class="login-page" id="loginPage">
    
    <!-- Animated Background -->
    <div class="login-bg">
      <div class="particles-container">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
      </div>
      <div class="orbit-ring">
        <div class="orbit-dot"></div>
      </div>
      <div class="orbit-ring">
        <div class="orbit-dot"></div>
      </div>
      <div class="orbit-ring"></div>
    </div>
    
    <!-- Login Card -->
    <div class="login-card" id="loginCard">
      
      <!-- Logo -->
      <div class="login-logo">
        <div class="login-logo-icon">⚖️</div>
        <h1 class="login-title">
          <span class="gradient-text">Kamus Praturan Pintar</span>
        </h1>
        <p class="login-subtitle">
          Pusat Data Hukum Cerdas — <span>By Abang AL</span>
        </p>
      </div>
      
      <!-- Role Selector -->
      <div class="login-roles" id="roleTabs">
        <button class="role-tab active" data-role="admin" id="tabAdmin" type="button">
          <span class="role-icon">🛡️</span>
          Admin
        </button>
        <button class="role-tab" data-role="visitor" id="tabVisitor" type="button">
          <span class="role-icon">👤</span>
          Pengunjung
        </button>
      </div>
      
      <!-- Login Form -->
      <form id="loginForm" autocomplete="off">
        
        <!-- Error Message -->
        <div class="login-error" id="loginError">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
          </svg>
          <span id="loginErrorText">Password salah!</span>
        </div>
        
        <!-- Password Input -->
        <div class="login-input-group">
          <label class="login-input-label" for="passwordInput">
            <span id="passwordLabel">Kata Sandi Admin</span>
          </label>
          <div class="login-input-wrapper">
            <svg class="input-icon-left" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input 
              type="password" 
              id="passwordInput" 
              class="login-input" 
              placeholder="Masukkan kata sandi..."
              style="padding-left: 48px;"
              required
              autofocus
            >
            <button type="button" class="toggle-password" id="togglePassword" aria-label="Toggle password visibility">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="eyeIcon">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>
        
        <!-- Login Button -->
        <button type="submit" class="login-btn" id="loginBtn">
          <span class="btn-text">Masuk</span>
          <div class="btn-loader"></div>
        </button>
      </form>
      
      <!-- Footer -->
      <div class="login-footer">
        <p>Kamus Praturan Pintar — Pusat Data Hukum Cerdas</p>
        <p class="designer">By <span>Abang AL</span></p>
      </div>
    </div>
    
    <!-- Version -->
    <div class="login-version">v1.0.0</div>
  </div>
  
  <script src="js/auth.js"></script>
</body>
</html>
